            </div>-->

          </div>
        </div>
      </div>

    </div>

  </section>

  <!-- ══════════════════════════════════════════════════════════════ -->
  <!-- SCRIPTS -->
  <!-- ══════════════════════════════════════════════════════════════ -->
  <script>
    // ── SLIDESHOW ──
    const slides = document.querySelectorAll('.slide-layer');
    const dots = document.querySelectorAll('.sdot');
    const progressBar = document.getElementById('progressBar');
    const curNum = document.getElementById('curNum');
    const totNum = document.getElementById('totNum');
    const INTERVAL = 6000;
    let cur = 0, timer = null;

    totNum.textContent = String(slides.length).padStart(2, '0');

    function updateDotUI(dot, isActive) {
      if(isActive) {
        dot.className = 'w-8 h-2 rounded-full bg-gradient-to-r from-primary to-secondary shadow-[0_0_12px_rgba(25,125,125,0.4)] cursor-pointer transition-all duration-500 sdot';
      } else {
        dot.className = 'w-2 h-2 rounded-full bg-white/20 cursor-pointer transition-all duration-500 sdot';
      }
    }

    function go(i) {
      // Remove active states
      slides[cur].classList.remove('slide-active');
      updateDotUI(dots[cur], false);
      
      const vids = slides[cur].querySelectorAll('video');
      vids.forEach(v => v.pause());

      // Set new active states
      cur = i;
      slides[cur].classList.add('slide-active');
      updateDotUI(dots[cur], true);
      curNum.textContent = String(cur + 1).padStart(2, '0');

      const activeVids = slides[cur].querySelectorAll('video');
      activeVids.forEach(v => { v.currentTime = 0; v.play().catch(() => {}); });

      restartProgress();
    }

    function next() { go((cur + 1) % slides.length); }

    function restartProgress() {
      progressBar.classList.remove('animate-fill-bar');
      void progressBar.offsetWidth; // Trigger reflow
      progressBar.classList.add('animate-fill-bar');
    }

    function startAuto() {
      clearInterval(timer);
      timer = setInterval(next, INTERVAL);
    }

    dots.forEach((d, idx) => {
      d.addEventListener('click', () => {
        if (idx !== cur) { go(idx); startAuto(); }
      });
    });

    const firstVids = slides[0].querySelectorAll('video');
    firstVids.forEach(v => v.play().catch(() => {}));

    startAuto();
    restartProgress();

    // ── VIDEO CARD PLAY/PAUSE ──
    const heroVideo = document.getElementById('heroVideo');
    const playBtn = document.getElementById('playBtn');
    let isPlaying = false;

    playBtn.addEventListener('click', () => {
      if (!isPlaying) {
        heroVideo.play().catch(() => {});
        playBtn.style.opacity = '0';
        playBtn.style.pointerEvents = 'none';
        isPlaying = true;
      }
    });

    heroVideo.addEventListener('ended', () => {
      isPlaying = false;
      playBtn.style.opacity = '1';
      playBtn.style.pointerEvents = 'auto';
    });

    // ── MOUSE GLOW ──
    const glow = document.getElementById('mouseGlow');
    const hero = document.getElementById('hero');

    hero.addEventListener('mousemove', (e) => {
      const rect = hero.getBoundingClientRect();
      glow.style.left = (e.clientX - rect.left) + 'px';
      glow.style.top = (e.clientY - rect.top) + 'px';
    });

    // ── PARTICLES ──
    const particleContainer = document.getElementById('particles');
    const PARTICLE_COUNT = 25;

    for (let i = 0; i < PARTICLE_COUNT; i++) {
      const p = document.createElement('div');
      const isTeal = Math.random() > 0.4;
      
      // Map previous classes to Tailwind
      p.className = `absolute rounded-full pointer-events-none ${isTeal ? 'bg-primary/50' : 'bg-secondary/50'}`;
      
      p.style.left = Math.random() * 100 + '%';
      p.style.bottom = '-10px';
      p.style.width = (Math.random() * 3 + 1) + 'px';
      p.style.height = p.style.width;
      
      // Reference Tailwind config keyframes for inline animation style
      p.style.animation = `particleRise ${Math.random() * 12 + 10}s linear ${Math.random() * 10}s infinite`;
      p.style.opacity = Math.random() * 0.6 + 0.2;
      
      particleContainer.appendChild(p);
    }

    // ── COUNTER ANIMATION ──
    const counters = document.querySelectorAll('[data-count]');
    const counterObserver = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          const el = entry.target;
          const target = parseInt(el.dataset.count);
          const prefix = el.dataset.prefix || '';
          const suffix = el.dataset.suffix || '';
          
          let start = 0;
          const duration = 2000;
          const startTime = performance.now();

          function update(now) {
            const elapsed = now - startTime;
            const progress = Math.min(elapsed / duration, 1);
            const ease = 1 - Math.pow(1 - progress, 3);
            const val = Math.round(start + (target - start) * ease);
            
            el.textContent = prefix + val + suffix;
            if (progress < 1) requestAnimationFrame(update);
          }
          requestAnimationFrame(update);
          counterObserver.unobserve(el);
        }
      });
    }, { threshold: 0.5 });

    counters.forEach(c => counterObserver.observe(c));

    // ── PARALLAX ON SCROLL ──
    window.addEventListener('scroll', () => {
      const scrollY = window.scrollY;
      const slideshow = document.querySelector('.slideshow');
      if (slideshow && scrollY < window.innerHeight) {
        slideshow.style.transform = `translateY(${scrollY * 0.3}px) scale(${1 + scrollY * 0.0003})`;
      }
    });
  </script>

</body>
</html>
